name: Publish FFF.Net to NuGet & GitHub Release

on:
  push:
    tags:
      - 'v*' 

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Create Runtime Directories
        run: |
          mkdir -p src/FFF.Net/runtimes/win-x64/native
          mkdir -p src/FFF.Net/runtimes/linux-x64/native
          mkdir -p src/FFF.Net/runtimes/osx-x64/native
          mkdir -p src/FFF.Net/runtimes/osx-arm64/native

      - name: Download Native Binaries
        run: |
          # Download fff v0.10.1 native C binaries
          curl -L -o fff.dll https://github.com/dmtrKovalenko/fff/releases/download/v0.10.1/c-lib-x86_64-pc-windows-msvc.dll
          curl -L -o libfff.so https://github.com/dmtrKovalenko/fff/releases/download/v0.10.1/c-lib-x86_64-unknown-linux-gnu.so
          curl -L -o libfff-intel.dylib https://github.com/dmtrKovalenko/fff/releases/download/v0.10.1/c-lib-x86_64-apple-darwin.dylib
          curl -L -o libfff-arm.dylib https://github.com/dmtrKovalenko/fff/releases/download/v0.10.1/c-lib-aarch64-apple-darwin.dylib

      - name: Place Renamed Binaries
        run: |
          mv fff.dll src/FFF.Net/runtimes/win-x64/native/fff.dll
          mv libfff.so src/FFF.Net/runtimes/linux-x64/native/libfff.so
          mv libfff-intel.dylib src/FFF.Net/runtimes/osx-x64/native/libfff.dylib
          mv libfff-arm.dylib src/FFF.Net/runtimes/osx-arm64/native/libfff.dylib

      - name: Build and Pack Library
        run: |
          rm -rf out
          dotnet pack src/FFF.Net/FFF.Net.csproj -c Release -o out

      - name: Prepare Standalone Release Assets
        run: |
          # Copy standalone DLL to output directory
          cp src/FFF.Net/bin/Release/net10.0/FFF.Net.dll out/FFF.Net.dll
          
          # Create zip containing standalone DLL, XML docs, PDB, and cross-platform native runtimes
          mkdir -p out/standalone/runtimes
          cp src/FFF.Net/bin/Release/net10.0/FFF.Net.dll out/standalone/
          cp src/FFF.Net/bin/Release/net10.0/FFF.Net.xml out/standalone/ || true
          cp src/FFF.Net/bin/Release/net10.0/FFF.Net.pdb out/standalone/ || true
          cp README.md out/standalone/ || true
          cp LICENSE out/standalone/ || true
          cp -r src/FFF.Net/runtimes/* out/standalone/runtimes/
          
          cd out/standalone && zip -r ../FFF.Net-standalone.zip . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.nupkg
            out/*.snupkg
            out/FFF.Net.dll
            out/FFF.Net-standalone.zip
          generate_release_notes: true
      
      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: ZozoV 

      - name: Publish to NuGet
        run: |
          dotnet nuget push out/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate